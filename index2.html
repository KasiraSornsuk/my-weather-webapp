<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พยากรณ์อากาศวันนี้</title>
    <style>
        /* CSS ตรงนี้ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #111111, #1f2122);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        input, button {
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin: 5px;
        }
    </style>
</head>
<body>

    <div class="weather-card">
        <input type="text" id="city-input" placeholder="พิมพ์ชื่อเมือง... (เช่น Bangkok)">
        <button id="search-btn">ค้นหา</button>

        <h2 id="city-name">กรุงเทพมหานคร</h2>
        <h1 id="temperature">32°C</h1>
        <p id="description">ท้องฟ้าแจ่มใส</p>
    </div>

    
      <script src="javaScr.js"></script>
    
</body>
</html>
