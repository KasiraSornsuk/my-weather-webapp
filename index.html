<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พยากรณ์อากาศวันนี้</title>
    <style>
        /* CSS ตรงนี้ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* 1. เปลี่ยนพื้นหลังเป็นรูปภาพจาก Pexels และใส่สีโทนเข้มสำรองไว้ */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.pexels.com/photos/18444084/pexels-photo-18444084.jpeg') no-repeat center center fixed;
            
            /* 2. จัดการให้รูปภาพคลุมเต็มหน้าจอพอดี */
            background-size: cover;
            
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .weather-card {
            /* 3. ปรับพื้นหลังการ์ดให้ออกโทนมืดเล็กน้อยเพื่อให้ตัวหนังสือสีขาวอ่านง่ายขึ้นบนรูปภาพ */
            background: rgba(0, 0, 0, 0.45);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* รองรับ Safari */
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        input, button {
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin: 5px;
        }

        /* เสริมสไตล์ให้ปุ่มเพื่อความสวยงาม */
        button {
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="weather-card">
        <input type="text" id="city-input" placeholder="พิมพ์ชื่อเมือง... (เช่น Bangkok)">
        <button id="search-btn">ค้นหา</button>

        <h2 id="city-name">กรุงเทพมหานคร</h2>
        <h1 id="temperature">32°C</h1>
        <p id="description">ท้องฟ้าแจ่มใส</p>
    </div>

    <script src="javaScr.js"></script>
    
</body>
</html>
